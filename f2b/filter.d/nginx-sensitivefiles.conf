# fail2ban filter — sensitive file, path-traversal, and hidden-file access attempts
#
# Matches access-log entries where Nginx returned HTTP 404 because a client
# requested a secret, backup, or configuration file, or attempted path
# traversal / hidden-file probing.  Covers these nginx.conf location blocks:
#
#   location ~ \.\.   { return 404; }            # path traversal (..)
#   location ~ /\.    { return 404; }            # hidden files  (/.)
#   location ~* "...(\\.env|\\.git|wp-config\\.php|\\.(bak|sql|...))$"
#                     { return 404; }            # secrets / backups
#
# Nginx default combined log format:
#   $remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent
#   "$http_referer" "$http_user_agent"

[Definition]
# Matches:
#   ..          — path-traversal sequences
#   /.<name>    — hidden file/dir probes  (e.g. /.git, /.env, /.htaccess)
#   wp-config.php, composer.json/lock, package.json/lock, Dockerfile,
#   docker-compose*.yml/yaml
#   *.bak *.sql *.sh *.swp *.orig *.cfg *.conf *.ini *.log *.dist *.yml *.yaml
failregex = ^<HOST> -\S* \S+ \[.*?\] "(?:GET|POST|HEAD)[^"]*(?:\.\.|/\.[^/ "]{1,}|wp-config\.php|composer\.(?:json|lock)|package(?:-lock)?\.json|Dockerfile|docker-compose[^"]*\.ya?ml|\.(?:env|git|svn|htaccess|htpasswd|bak|sql|sh|swp|orig|cfg|conf|ini|log|dist|yml|yaml)\b)[^"]*" 404\b

ignoreregex =
