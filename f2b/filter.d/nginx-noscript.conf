# fail2ban filter — PHP/script file access attempts
#
# Matches access-log entries where Nginx returned HTTP 444 (connection closed
# without response) because the request targeted a PHP or script file.
# This corresponds to the location block in nginx.conf:
#   location ~* "\.(php|phtml|php3|php4|php5|php7|phar)$" { return 444; }
#
# Nginx default combined log format:
#   $remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent
#   "$http_referer" "$http_user_agent"

[Definition]
failregex = ^<HOST> -\S* \S+ \[.*?\] "(?:GET|POST|HEAD)[^"]*\.(?:php\d*|phtml|phar)[^"]*" (?:444|404)\b

ignoreregex =
