# fail2ban filter — malicious / scanner user-agent requests
#
# Matches access-log entries where Nginx returned HTTP 403 because the
# request carried a user-agent string associated with scanners or bad bots.
# This corresponds to the block in nginx.conf:
#   if ($http_user_agent ~* (bot|crawler|spider|scraper|java|nikto|sqlmap|nmap)) {
#       return 403;
#   }
#
# The UA field is the last double-quoted column in the combined log format, so
# the pattern anchors the match against that column to avoid false positives on
# unrelated 403 responses (e.g. from the bad-referer if-block).
#
# Nginx default combined log format:
#   $remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent
#   "$http_referer" "$http_user_agent"

[Definition]
failregex = ^<HOST> -\S* \S+ \[.*?\] "[^"]*" 403 \d+ "[^"]*" "[^"]*(?:bot|crawler|spider|scraper|nikto|sqlmap|nmap|java)[^"]*"$

ignoreregex =
