# fail2ban filter — nginx rate-limit violations
#
# Matches access-log entries where Nginx returned HTTP 429 because a client
# exceeded the limit_req zone defined in nginx.conf (limit_req_status 429).
#
# Nginx default combined log format:
#   $remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent
#   "$http_referer" "$http_user_agent"

[Definition]
failregex = ^<HOST> -\S* \S+ \[.*?\] "(?:GET|POST|HEAD|PUT|DELETE|PATCH|OPTIONS)[^"]*" 429\b

ignoreregex =
