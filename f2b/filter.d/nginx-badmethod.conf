# fail2ban filter — bad HTTP method attempts
#
# Matches access-log entries where Nginx returned HTTP 405 because the
# request used a method outside the allowed set defined in nginx.conf:
#   if ($request_method !~ ^(GET|POST|HEAD|PUT|DELETE)$) { return 405; }
#
# Nginx default combined log format:
#   $remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent
#   "$http_referer" "$http_user_agent"

[Definition]
failregex = ^<HOST> -\S* \S+ \[.*?\] "[^"]*" 405\b

ignoreregex =
